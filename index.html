<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브코딩 PT 텔레프롬프터</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --fs: 0.9rem; }

    body {
      background: #080910;
      color: #e8e9f3;
      font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 22px;
      background: #0d0e1a;
      border-bottom: 1px solid #1a1d35;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 0.92rem;
      font-weight: 800;
      background: linear-gradient(135deg,#9b8ffd,#f4c542);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    #prog-track {
      flex: 1;
      height: 3px;
      background: #1a1d35;
      border-radius: 999px;
      max-width: 180px;
    }

    #prog-fill {
      height: 100%;
      background: linear-gradient(90deg,#7c6ff0,#f4c542);
      border-radius: 999px;
      transition: width .5s ease;
      width: 0%;
    }

    #prog-text { font-size: 0.78rem; color: #7880a0; white-space: nowrap; min-width: 54px; }

    /* 상태바 녹음 중 스타일 */
    #status.on { color: #fff; }

    .rec-pulse {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 7px;
      vertical-align: middle;
      animation: recPulseAnim 1.1s ease-in-out infinite;
    }

    @keyframes recPulseAnim {
      0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      50%      { opacity: .65; transform: scale(.8); box-shadow: 0 0 0 7px rgba(239,68,68,.0); }
    }

    /* ── SCRIPT SCROLL AREA ── */
    #scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 56px 0 140px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #scroll::-webkit-scrollbar { width: 3px; }
    #scroll::-webkit-scrollbar-thumb { background: #1a1d35; border-radius: 999px; }

    /* ── BLOCKS ── */
    .block {
      max-width: 800px;
      margin: 0 auto;
      padding: 3px 28px;
      cursor: pointer;
      transition: padding .35s cubic-bezier(.4,0,.2,1);
    }

    .inner {
      padding: 10px 16px;
      border-radius: 12px;
      line-height: 1.8;
      border: 2px solid transparent;
      transition: all .4s cubic-bezier(.4,0,.2,1);
      word-break: keep-all;
    }

    /* past */
    .block.past .inner {
      font-size: var(--fs);
      font-weight: 400;
      opacity: .18;
      color: #fff;
    }

    /* current – 왼쪽 라인만, 나머지 동일 */
    .block.current { padding: 3px 28px; }

    .block.current .inner {
      font-size: var(--fs);
      font-weight: 400;
      line-height: 1.85;
      padding: 14px 20px;
      background: rgba(37,99,235,0.07);
      border: none;
      border-left: 3px solid #3b82f6;
      border-radius: 0 12px 12px 0;
      color: #fff;
      box-shadow: none;
    }

    /* next 1 */
    .block.n1 .inner {
      font-size: var(--fs);
      font-weight: 400;
      opacity: .70;
      color: #fff;
    }

    /* next 2 */
    .block.n2 .inner {
      font-size: var(--fs);
      font-weight: 400;
      opacity: .42;
      color: #fff;
    }

    /* far future */
    .block.far .inner {
      font-size: var(--fs);
      font-weight: 400;
      opacity: .22;
      color: #fff;
    }

    /* header type */
    .block.hdr .inner {
      font-size: var(--fs) !important;
      font-weight: 700 !important;
      color: #f4c542 !important;
      opacity: 1 !important;
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 5px 0 !important;
      border-radius: 0 !important;
      border-bottom: 1px solid #1a1d35 !important;
      letter-spacing: .05em;
      margin: 6px 0;
    }

    .block.hdr.current .inner {
      font-size: var(--fs) !important;
      color: #f4c542 !important;
      background: none !important;
      border: none !important;
      border-bottom: 2px solid #f4c542 !important;
      box-shadow: none !important;
    }

    .block:hover .inner { opacity: 1 !important; }

    /* ── CONTROLS ── */
    #controls {
      flex-shrink: 0;
      background: #0d0e1a;
      border-top: 1px solid #1a1d35;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cbtn {
      padding: 9px 18px;
      border-radius: 9px;
      border: none;
      font-family: inherit;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s, opacity .12s;
      flex-shrink: 0;
    }

    .cbtn:hover { transform: translateY(-1px); }
    .cbtn:active { transform: translateY(0); opacity: .85; }

    .kbhint {
      font-size: .7rem;
      color: #1e2040;
      background: #0d0e1a;
      border: 1px solid #1a1d35;
      padding: 3px 7px;
      border-radius: 5px;
    }

    #status {
      flex: 1;
      font-size: .8rem;
      color: #44475a;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #recognized {
      font-size: .76rem;
      color: #7c6ff0;
      max-width: 260px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    #prog-label { font-size: .78rem; color: #7880a0; white-space: nowrap; flex-shrink: 0; }

    /* font-size control */
    #font-ctrl { display: flex; align-items: center; gap: 6px; }
    #font-ctrl span { font-size: .75rem; color: #7880a0; }
    #font-range { width: 70px; accent-color: #7c6ff0; cursor: pointer; }

    /* ── RECORDING PANEL (우측 하단 플로팅) ── */
    #rec-modal {
      display: none;
      position: fixed;
      bottom: 58px;
      right: 20px;
      z-index: 300;
      width: 240px;
    }
    #rec-modal.show { display: block; }

    .rec-box {
      background: rgba(10,11,22,0.95);
      border: 1.5px solid #1e2038;
      border-radius: 20px;
      padding: 14px 16px 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(124,111,240,.12);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .rec-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .rec-dot-anim {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
      animation: recdot 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes recdot {
      0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      50%      { opacity: .7; transform: scale(.88); box-shadow: 0 0 0 6px rgba(239,68,68,.0); }
    }

    .rec-title {
      font-size: .95rem;
      font-weight: 800;
      color: #fff;
    }

    .rec-sub {
      font-size: .72rem;
      color: #44475a;
      margin-bottom: 10px;
    }

    /* Canvas */
    .eq-wrap {
      background: #060810;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 18px;
      border: 1px solid #1a1d35;
      position: relative;
    }

    #eq-canvas {
      display: block;
      width: 100%;
      height: 70px;
    }


    .rec-stop-btn {
      padding: 9px 28px;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: .88rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(220,38,38,.4);
      transition: transform .12s, box-shadow .12s;
    }
    .rec-stop-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(220,38,68,.5); }
    .rec-stop-btn:active { transform: translateY(0); }

    /* ── MATCH TOAST ── */
    @keyframes slideUpToast {
      from { transform: translateX(-50%) translateY(16px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
    }

    /* Highlight flash on current block when found */
    @keyframes foundFlash {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,.0); }
      40%  { box-shadow: 0 0 40px 12px rgba(74,222,128,.45); }
      100% { box-shadow: 0 0 50px rgba(37,99,235,.25), 0 12px 40px rgba(0,0,0,.6); }
    }
    .block.current.found .inner {
      animation: foundFlash .7s ease forwards;
    }

    /* ── INDEX SCREEN ── */
    #index-screen {
      position: fixed;
      inset: 0;
      background: #080910;
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .idx-box {
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .idx-emoji { font-size: 3rem; margin-bottom: 14px; }
    .idx-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg,#9b8ffd,#f4c542);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .idx-sub {
      font-size: .88rem;
      color: #44475a;
      margin-bottom: 32px;
    }
    .idx-drop {
      display: block;
      border: 2px dashed #2a2d48;
      border-radius: 20px;
      padding: 44px 28px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 16px;
      position: relative;
      text-align: center;
    }
    .idx-drop:hover, .idx-drop.drag {
      border-color: #7c6ff0;
      background: rgba(124,111,240,.06);
    }
    #idx-file { display: none; }
    .idx-drop-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .idx-drop-text {
      font-size: .9rem;
      color: #6668a0;
      line-height: 1.7;
    }
    .idx-drop-text strong { color: #9b8ffd; }
    /* ── 직접 넣기 ── */
    .idx-or {
      font-size: .75rem;
      color: #2a2d48;
      margin: 14px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .idx-or::before, .idx-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1a1d35;
    }

    .idx-direct-btn {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid #2a2d48;
      color: #6668a0;
      font-family: inherit;
      font-size: .88rem;
      padding: 13px 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .idx-direct-btn:hover { border-color: #7c6ff0; color: #9b8ffd; }

    #direct-section { width: 100%; }

    #direct-textarea {
      display: block;
      width: 100%;
      height: 260px;
      background: #0d0e1a;
      border: 1px solid #1a1d35;
      border-radius: 12px;
      color: #e8e9f3;
      font-family: inherit;
      font-size: .85rem;
      line-height: 1.65;
      padding: 16px 18px;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .15s;
    }
    #direct-textarea:focus { border-color: #4a4e8a; }
    #direct-textarea::placeholder { color: #2a2d48; line-height: 1.8; }

    .direct-actions { display: flex; gap: 10px; }

    .direct-cancel-btn {
      flex: 1;
      background: none;
      border: 1px solid #1a1d35;
      color: #44475a;
      font-family: inherit;
      font-size: .85rem;
      padding: 13px;
      border-radius: 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .direct-cancel-btn:hover { color: #7880a0; border-color: #2a2d48; }

    .direct-start-btn {
      flex: 2;
      background: linear-gradient(135deg, #7c6ff0, #9b8ffd);
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      padding: 13px;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .direct-start-btn:hover { opacity: .88; }

    @media (max-width: 640px) {
      #direct-textarea { height: 200px; font-size: .82rem; }
    }

    /* ── HOME BUTTON ── */
    #home-btn {
      background: none;
      border: 1px solid #1a1d35;
      color: #44475a;
      font-family: inherit;
      font-size: .78rem;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s, border-color .15s;
      min-height: 32px;
    }
    #home-btn:hover { color: #9b8ffd; border-color: #7c6ff0; }

    /* ── FULLSCREEN EXIT BUTTON ── */
    #fs-exit-btn {
      display: none;
      position: fixed;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: rgba(13,14,26,0.82);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.65);
      font-family: inherit;
      font-size: .84rem;
      padding: 12px 36px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    #fs-exit-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    #fs-exit-btn.visible { display: block; }

    /* ── MOBILE / TABLET RESPONSIVE ── */
    @media (max-width: 640px) {
      #topbar { padding: 8px 12px; gap: 8px; }
      #prog-label { display: none; }
      #prog-track { max-width: 100px; }
      #font-ctrl span { display: none; }
      #font-range { width: 80px; }
      #home-btn { font-size: .7rem; padding: 4px 8px; }

      #scroll { padding: 32px 0 120px; }

      .block { padding: 2px 16px; }
      .block.current { padding: 6px 16px; }

      #controls { padding: 8px 14px; gap: 8px; }
      #status { font-size: .75rem; }
      #recognized { font-size: .72rem; }

      #rec-modal { bottom: 52px; right: 10px; width: 190px; }

      /* Index screen */
      .idx-title { font-size: 1.4rem; }
      .idx-drop { padding: 36px 20px; }
      .idx-drop-icon { font-size: 1.8rem; }
      .idx-drop-text { font-size: .84rem; }
      .idx-sub { font-size: .8rem; margin-bottom: 24px; }
    }

    @media (max-width: 900px) and (min-width: 641px) {
      #topbar { padding: 9px 16px; gap: 10px; }
      #prog-track { max-width: 130px; }
      #font-range { width: 80px; }
      .block { padding: 2px 20px; }
      #rec-modal { width: 210px; }
    }

    /* 터치 기기 전용: 탭 영역 크게 */
    @media (hover: none) and (pointer: coarse) {
      .block { cursor: default; }
      .cbtn { min-height: 44px; }
      #home-btn { min-height: 38px; padding: 6px 12px; }
      #font-range { height: 28px; }
      .idx-drop { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div id="topbar">
  <button id="home-btn" onclick="goHome()">⌂ HOME</button>
  <span id="prog-label">전체 본문</span>
  <div id="prog-track"><div id="prog-fill"></div></div>
  <div id="prog-text">0/100%</div>
  <div style="flex:1"></div>
  <div id="font-ctrl">
    <span>글자</span>
    <input type="range" id="font-range" min="90" max="200" value="90">
  </div>
</div>

<div id="scroll"></div>

<div id="controls">
  <div id="status">준비됨 · Chrome 브라우저에서 열어주세요</div>
  <div id="recognized"></div>
</div>

<!-- ═══ INDEX SCREEN ═══ -->
<div id="index-screen">
  <div class="idx-box">
    <div class="idx-emoji">🎤</div>
    <div class="idx-title">PT 텔레프롬프터</div>
    <div class="idx-sub">발표 대본을 음성으로 자동 추적합니다</div>

    <!-- 파일 업로드 영역 -->
    <div id="idx-file-area">
      <label class="idx-drop" id="idx-drop">
        <input type="file" id="idx-file" accept=".txt">
        <div class="idx-drop-icon">📄</div>
        <div class="idx-drop-text">TXT 파일을 여기에 드래그하거나<br><strong>클릭/탭하여 선택</strong>하세요</div>
      </label>
      <div class="idx-or">또는</div>
      <button class="idx-direct-btn" onclick="showDirectInput()">✏️ 직접 넣기</button>
    </div>

    <!-- 직접 입력 영역 -->
    <div id="direct-section" style="display:none">
      <textarea id="direct-textarea" placeholder="여기에 대본을 입력하거나 붙여넣으세요...&#10;&#10;빈 줄로 단락을 구분합니다."></textarea>
      <div class="direct-actions">
        <button class="direct-cancel-btn" onclick="hideDirectInput()">← 돌아가기</button>
        <button class="direct-start-btn" onclick="submitDirectInput()">시작하기 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ FULLSCREEN EXIT BUTTON ═══ -->
<button id="fs-exit-btn" onclick="fsExit()">✕ 나가기</button>

<!-- ═══ RECORDING PANEL ═══ -->
<div id="rec-modal" onclick="stopMic()" title="클릭하여 중지">
  <div class="rec-box">
    <div class="eq-wrap">
      <canvas id="eq-canvas"></canvas>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  대본 텍스트
// ══════════════════════════════════════════════
const SCRIPT_RAW = `안녕하세요. 오늘 발표를 맡은 김용민입니다.

오늘의 주제는 '바이브코딩(Vibe Coding)이란 무엇인가'입니다.

혹시 여러분은 이런 생각을 해보신 적이 있으신가요?

"내가 원하는 앱이나 웹페이지를 만들고 싶은데, 코딩을 몰라서 못 하겠다."
"엑셀 작업이나 반복 업무를 자동화하고 싶은데, 개발자에게 부탁해야 하나?"
"좋은 아이디어는 있는데, 구현할 사람이 없어서 멈춰 있다."

과거에는 이런 생각이 들어도 실제로 무언가를 만들기까지 꽤 큰 장벽이 있었습니다.
HTML, CSS, JavaScript, Python 같은 문법을 배워야 했고,
데이터베이스, 서버, 배포, 보안 같은 개념도 알아야 했습니다.

그런데 지금은 상황이 빠르게 바뀌고 있습니다.
AI에게 자연어로 설명하면, AI가 코드를 만들고, 수정하고, 실행 가능한 형태로 도와주는 시대가 왔습니다.

이 흐름을 요즘 '바이브코딩'이라고 부릅니다.
쉽게 말하면, 내가 만들고 싶은 느낌과 의도를 말하면,
AI가 그 의도를 코드로 바꿔주는 방식입니다.

오늘 발표에서는 바이브코딩이 무엇인지,
왜 갑자기 중요해졌는지,
기존 코딩과 무엇이 다른지,
어떤 도구들이 있는지,
그리고 우리가 실제 업무나 교육 현장에서 어떻게 활용할 수 있는지까지 살펴보겠습니다.

오늘의 핵심 메시지는 하나입니다.

"앞으로 중요한 것은 코드를 얼마나 잘 외우느냐가 아니라,
무엇을 만들고 싶은지 명확하게 설명하고,
AI를 잘 지휘할 수 있느냐입니다."

그럼 시작하겠습니다.

슬라이드 1. 바이브코딩(Vibe Coding)이란? / 4분

바이브코딩은 한마디로 말하면,
AI 지휘자가 되어 아이디어를 현실로 만드는 개발 방식입니다.

여기서 중요한 단어는 '지휘자'입니다.
과거의 개발자는 직접 악기를 연주하는 사람에 가까웠습니다.
코드를 한 줄 한 줄 직접 작성하고,
오류가 나면 직접 찾아서 고치고,
기능을 추가할 때도 문법과 구조를 모두 기억해야 했습니다.

그런데 바이브코딩에서는 역할이 조금 달라집니다.
사람은 지휘자가 되고,
AI는 실제 연주를 담당하는 오케스트라처럼 움직입니다.

사람은 이렇게 말합니다.

"로그인 화면을 만들어줘."
"버튼을 누르면 결과가 나오게 해줘."
"전체 디자인은 좀 더 깔끔하고 기업형으로 바꿔줘."
"모바일에서도 잘 보이게 수정해줘."

그러면 AI가 그 의도를 이해하고 코드를 생성합니다.
물론 완벽하지는 않습니다.
하지만 첫 결과물을 만드는 속도가 이전과 비교할 수 없을 정도로 빨라졌습니다.

이제 코딩은 단순히 문법을 외우는 영역에서
의도와 느낌을 전달하는 영역으로 이동하고 있습니다.

여기서 'Vibe'라는 표현이 재미있습니다.
정확한 설계 문서를 처음부터 완벽하게 쓰지 않아도,
내가 원하는 분위기와 방향을 AI에게 설명하고,
결과물을 보면서 계속 다듬어 가는 방식이기 때문입니다.

예를 들어 이렇게 말할 수 있습니다.

"학교 선생님들이 보기 편한 출석 체크 웹앱을 만들어줘."
"초등학생도 사용할 수 있게 버튼은 크게, 색상은 부드럽게 해줘."
"관리자는 학생 목록을 추가하고, 출석 현황을 엑셀로 다운로드할 수 있게 해줘."

이 정도 설명만으로도 AI는 꽤 그럴듯한 초안을 만들어냅니다.

오늘 발표에서는 이 변화가 단순한 유행인지,
아니면 실제로 우리의 일하는 방식을 바꿀 변화인지 함께 보겠습니다.

슬라이드 2. "코딩을 할 줄 몰라도 앱을 만든다고?" / 5분

바이브코딩이 왜 갑자기 주목받고 있는지에 대한 이야기입니다.

많은 사람들이 처음 바이브코딩을 접하면 이렇게 말합니다.

"코딩을 할 줄 몰라도 앱을 만든다고?"
"그게 정말 가능해?"
"그럼 개발자는 필요 없어지는 건가?"

이 질문들이 자연스럽게 나옵니다.

결론부터 말하면,
코딩을 전혀 몰라도 간단한 앱이나 웹페이지의 초안은 만들 수 있는 시대가 되었습니다.
하지만 완성도 높은 서비스, 안정적인 시스템, 보안이 중요한 서비스는 여전히 전문성이 필요합니다.

즉, 바이브코딩은 개발자를 없애는 기술이라기보다
개발의 진입 장벽을 낮추고,
아이디어를 빠르게 실험할 수 있게 해주는 기술에 가깝습니다.

예전에는 아이디어가 있어도 시작하기가 어려웠습니다.
예를 들어 어떤 선생님이 이런 생각을 했다고 가정해 보겠습니다.

"학생들이 퀴즈를 풀고 점수를 바로 확인할 수 있는 간단한 페이지가 있으면 좋겠다."

과거에는 이걸 만들려면 개발자에게 부탁해야 했습니다.
기획서를 쓰고, 요구사항을 설명하고, 화면을 설계하고,
개발 기간을 기다려야 했습니다.

하지만 지금은 AI에게 이렇게 말할 수 있습니다.

"초등학생용 성경퀴즈 웹페이지를 만들어줘.
문제는 OX, 객관식, 주관식으로 나누고,
정답을 맞히면 점수가 올라가게 해줘.
디자인은 귀엽고 교회 행사 느낌이 나게 해줘."

이렇게 말하면 AI가 HTML, CSS, JavaScript를 작성해 줍니다.
물론 한 번에 완벽하게 나오지는 않습니다.
하지만 바로 눈으로 볼 수 있는 결과가 생깁니다.

이것이 바이브코딩의 가장 큰 충격입니다.
'생각'에서 '실행 가능한 초안'까지의 거리가 매우 짧아진 것입니다.

예전에는 개발을 시작하기 전에 공부해야 할 것이 많았습니다.
지금은 일단 만들어 보고, 그다음에 고쳐가는 방식이 가능해졌습니다.

여기서 중요한 변화가 있습니다.
키보드로 코드를 직접 치는 시간은 줄어들고,
AI에게 무엇을 만들지 설명하고,
결과물을 판단하고,
다시 수정 지시를 내리는 시간이 늘어납니다.

즉, 개발자의 손은 조금 덜 바빠지고,
머리는 더 바빠지는 시대가 되었습니다.

바이브코딩의 핵심 질문은 이것입니다.

"어떻게 짤 것인가?"가 아니라
"무엇을 만들 것인가?"입니다.

앞으로는 좋은 질문을 던지는 사람,
문제를 잘 정의하는 사람,
사용자의 불편을 잘 이해하는 사람이
더 강력한 개발 생산성을 갖게 될 가능성이 큽니다.

슬라이드 3. 코딩의 역사: 천공카드부터 바이브코딩까지 / 5분

그럼 코딩의 역사를 살펴보겠습니다.

바이브코딩이 갑자기 하늘에서 떨어진 변화가 아니라,
오랜 시간 이어진 개발 방식 변화의 연장선에 있기 때문입니다.

1950년대에는 컴퓨터를 사용한다는 것 자체가 매우 어려운 일이었습니다.
천공카드라는 종이에 구멍을 뚫어 명령을 입력했고,
컴퓨터는 지금처럼 친절한 화면도 없었습니다.
이 시기는 사람이 기계의 언어에 맞춰야 했던 시기입니다.

1970년대에는 어셈블리어와 같은 낮은 수준의 언어가 활용되었습니다.
기계어보다는 조금 나아졌지만,
여전히 컴퓨터 내부 구조를 잘 알아야 했습니다.

1990년대에는 C++, Java 같은 언어가 널리 사용되면서
더 복잡하고 강력한 프로그램을 만들 수 있게 되었습니다.
기업 시스템, 웹 서비스, 대형 소프트웨어가 본격적으로 발전했습니다.
하지만 그만큼 개발의 복잡성도 커졌습니다.

2010년대에는 IDE, 자동완성, 테스트 자동화, GitHub, 클라우드 같은 도구들이 등장하면서
개발 생산성이 크게 올라갔습니다.
이때까지만 해도 개발자는 여전히 코드를 직접 작성하는 사람이었습니다.
다만 도구가 더 똑똑해졌을 뿐입니다.

그리고 2020년대 중반,
생성형 AI가 개발 과정에 본격적으로 들어오면서
개발 방식이 다시 한 번 바뀌고 있습니다.

이제는 사람이 모든 코드를 직접 쓰지 않아도 됩니다.
AI가 초안을 만들고,
사람은 검토하고,
다시 지시하고,
수정 방향을 잡습니다.

이 변화는 단순한 자동완성의 수준을 넘어섭니다.
예전 자동완성은 내가 쓰고 있는 코드의 다음 줄을 예측해 주는 정도였습니다.
하지만 지금의 AI 개발 도구는
"이런 앱을 만들어줘"라는 요청을 받고
파일 구조, 화면, 기능, 스타일, 배포 방식까지 한꺼번에 제안할 수 있습니다.

즉, 코딩의 역사는 계속해서
기계 중심에서 인간 중심으로 이동해 왔습니다.

처음에는 사람이 기계의 언어를 배워야 했습니다.
이제는 기계가 사람의 언어를 이해하려고 합니다.

바이브코딩은 그 변화의 상징입니다.

슬라이드 4. 바이브코딩이란? / 5분

바이브코딩의 정의를 조금 더 구체적으로 보겠습니다.

바이브코딩은 사용자가 자연어로 원하는 것을 설명하면,
AI가 그 의도를 파악하여 실행 가능한 코드를 자동으로 생성하는 개발 방식입니다.

여기서 자연어란 우리가 일상에서 쓰는 말입니다.
"버튼을 크게 해줘."
"로그인 기능을 넣어줘."
"결과 화면을 더 예쁘게 바꿔줘."
"모바일에서도 깨지지 않게 해줘."
이런 말들이 모두 자연어입니다.

바이브코딩의 기본 흐름은 세 단계로 볼 수 있습니다.

첫 번째, You Vibe.
사람이 원하는 것을 말합니다.
예를 들어 "다크모드가 있는 할 일 앱을 만들어줘"라고 말합니다.

두 번째, AI Vibes Back.
AI가 그 요청을 해석해서 코드를 작성합니다.
화면을 만들고, 버튼을 만들고, 데이터를 저장하는 구조를 만듭니다.

세 번째, Magic Happens.
결과물이 나타납니다.
사용자는 그 결과를 보고 다시 말합니다.
"좋은데, 버튼 색을 바꿔줘."
"완료한 항목은 아래로 내려가게 해줘."
"모바일에서는 카드 형태로 보이게 해줘."

이렇게 대화하듯이 개발이 진행됩니다.

기존 방식과 가장 큰 차이는 시작점입니다.
기존에는 개발자가 코드를 쓰다가 막히면 AI에게 질문했습니다.
하지만 바이브코딩에서는 AI가 처음부터 구현을 시작하고,
사람은 방향과 기준을 제시합니다.

예를 들어 기존 방식은 이렇습니다.

"이 JavaScript 오류가 왜 나는지 알려줘."
"React에서 상태 관리를 어떻게 해야 하지?"
"CSS flex가 왜 안 먹지?"

반면 바이브코딩 방식은 이렇습니다.

"교회 성경퀴즈용 웹앱을 만들어줘.
문제, 타이머, 점수판, 정답 공개 기능이 필요해.
디자인은 어린이부 느낌으로 귀엽게 해줘."

질문의 수준이 달라집니다.
문법 중심 질문에서 목적 중심 질문으로 바뀝니다.

그렇기 때문에 바이브코딩을 잘하려면
프로그래밍 문법만큼이나
요구사항을 명확히 설명하는 능력이 중요합니다.

좋은 바이브코딩 지시는 보통 다음 요소를 포함합니다.

누가 사용할 것인지,
무엇을 할 수 있어야 하는지,
어떤 화면이 필요한지,
어떤 분위기와 디자인을 원하는지,
어떤 제약 조건이 있는지,
최종 결과물이 어디에서 실행되어야 하는지.

이 정보를 잘 줄수록 AI의 결과물도 좋아집니다.

슬라이드 5. 새벽 2시 야근 vs 오전 10시 완성 / 5분

바이브코딩이 가져오는 경험의 차이를 보여줍니다.

제목이 조금 과장되어 보일 수 있습니다.
"새벽 2시 야근 vs 오전 10시 완성"
하지만 실제로 AI를 잘 활용하면
초기 구현과 반복 수정 속도는 확실히 빨라집니다.

전통적인 코딩에서는 작은 기능 하나를 만들더라도 많은 단계를 거칩니다.
요구사항을 정리하고,
파일을 만들고,
화면을 구성하고,
코드를 작성하고,
오류를 해결하고,
디자인을 다듬고,
다시 테스트합니다.

이 과정이 익숙한 개발자에게는 자연스럽지만,
비개발자나 입문자에게는 매우 높은 장벽입니다.

반면 바이브코딩은 첫 결과물을 빠르게 만듭니다.
완벽한 결과물이 아니라도 상관없습니다.
중요한 것은 화면에 보이는 무언가가 빨리 생긴다는 점입니다.

예를 들어 사내 교육 신청 페이지를 만든다고 해보겠습니다.

전통 방식에서는 담당자가 요구사항을 문서화하고,
개발팀과 논의하고,
디자인을 만들고,
개발 일정에 맞춰 진행해야 합니다.

바이브코딩 방식에서는 먼저 AI에게 말합니다.

"교육 신청 페이지를 만들어줘.
교육명, 일정, 신청자 이름, 부서, 연락처를 입력받고,
신청 완료 후 확인 화면을 보여줘.
관리자는 신청 목록을 볼 수 있게 해줘."

그러면 AI가 기본 구조를 만들어줍니다.
담당자는 그것을 보면서 말합니다.

"신청 버튼을 더 크게 해줘."
"회사 색상에 맞춰 파란색 계열로 바꿔줘."
"모바일에서 입력칸이 너무 좁으니 넓혀줘."
"엑셀 다운로드 버튼도 추가해줘."

이렇게 작업하면 아이디어를 빠르게 눈으로 확인할 수 있습니다.

물론 중요한 시스템에서는 여전히 검토가 필요합니다.
개인정보를 다루는 경우,
보안이 필요한 경우,
여러 부서가 함께 사용하는 경우에는
전문 개발자의 점검이 반드시 필요합니다.

하지만 프로토타입, MVP, 내부 자동화, 교육용 샘플,
간단한 웹페이지 제작에서는
바이브코딩의 속도가 큰 장점이 됩니다.

여기서 MVP라는 말도 중요합니다.
MVP는 Minimum Viable Product의 약자입니다.
최소 기능 제품이라는 뜻입니다.
완성품은 아니지만,
아이디어가 실제로 가능한지 확인할 수 있는 최소한의 결과물을 말합니다.

바이브코딩은 바로 이 MVP 제작에 매우 강합니다.
처음부터 완벽하게 만들려고 하기보다,
작게 만들고,
바로 확인하고,
빠르게 고치는 방식에 잘 맞습니다.

슬라이드 6. 2025~2026년 바이브코딩 도구 전쟁 / 5분

대표적인 바이브코딩 도구들을 살펴보겠습니다.

요즘 AI 개발 도구는 정말 빠르게 늘어나고 있습니다.
그중 많이 언급되는 도구로는 Cursor, Replit, Lovable, Claude Code, GitHub Copilot, Gemini CLI 등이 있습니다.

먼저 Cursor입니다.
Cursor는 AI 기능이 강하게 결합된 코드 에디터입니다.
기존 VS Code와 비슷한 느낌으로 사용할 수 있지만,
프로젝트 전체 맥락을 읽고 코드를 수정해 주는 기능이 강점입니다.
개발 경험이 어느 정도 있는 사람에게 특히 유용합니다.

두 번째는 Replit입니다.
Replit은 브라우저에서 바로 코딩하고 실행하고 배포까지 할 수 있는 도구입니다.
설치 과정이 비교적 간단하고,
교육용이나 입문자용으로 많이 활용됩니다.
학생들이나 비개발자가 간단한 프로젝트를 만들기에 좋습니다.

세 번째는 Lovable입니다.
Lovable은 텍스트로 웹앱을 빠르게 만드는 데 강점이 있는 도구입니다.
비개발자가 "이런 웹사이트 만들어줘"라고 요청하면
시각적으로 확인 가능한 결과물을 만들어 주는 방식입니다.
스타트업이나 기획자가 아이디어를 빠르게 실험할 때 활용하기 좋습니다.

네 번째는 Claude Code입니다.
Claude Code는 터미널 기반으로 동작하는 AI 개발 도구입니다.
프로젝트 구조를 이해하고,
파일을 수정하고,
명령어를 실행하는 방식으로 개발자를 도와줍니다.
전문 개발자나 개발 환경에 익숙한 사람에게 적합합니다.

다섯 번째는 GitHub Copilot입니다.
GitHub Copilot은 VS Code와 잘 통합되어 있고,
코드 자동완성, 함수 생성, 테스트 코드 작성 등에 많이 사용됩니다.
기존 개발자가 생산성을 높이는 데 매우 유용합니다.

여섯 번째는 Gemini CLI입니다.
구글 생태계와 연결된 터미널 기반 도구로,
개발 작업을 AI와 함께 진행하는 흐름에서 활용됩니다.

여기서 중요한 점은
도구마다 대상 사용자가 다르다는 것입니다.

완전히 처음 시작하는 사람은 Replit이나 Lovable 같은 도구가 편할 수 있습니다.
기존 개발자는 Cursor나 Copilot, Claude Code 같은 도구가 더 강력할 수 있습니다.
즉, 하나의 정답 도구가 있는 것이 아니라
내 수준과 목적에 맞는 도구를 선택하는 것이 중요합니다.

발표를 듣는 분들이 비개발자라면,
처음부터 복잡한 개발 환경을 설치하기보다
브라우저 기반 도구로 작은 결과물을 만들어 보는 것이 좋습니다.

개발자라면,
기존 프로젝트에 AI를 붙여서
리팩토링, 테스트 코드 생성, 오류 수정, 문서화부터 시작해 보는 것이 좋습니다.

슬라이드 7. 전통적 코딩 vs 바이브코딩 / 5분

전통적 코딩과 바이브코딩을 비교해 보겠습니다.

전통적 코딩의 핵심 역량은 프로그래밍 언어 문법 숙련도였습니다.
JavaScript를 잘 아는가,
Python을 잘 아는가,
React를 잘 쓰는가,
SQL을 잘 작성하는가가 중요했습니다.

하지만 바이브코딩에서는 문제 정의 능력과 논리적 사고력이 더 중요해집니다.

물론 문법을 아는 것은 여전히 도움이 됩니다.
AI가 만든 코드가 맞는지 판단하려면 기본 지식이 필요합니다.
하지만 처음 시작하는 단계에서는
문법을 모두 외우지 않아도 결과물을 만들 수 있습니다.

학습 기간도 달라집니다.
전통적 코딩은 수개월에서 수년의 학습이 필요했습니다.
반면 바이브코딩은 며칠 또는 몇 주 안에 간단한 결과물을 만들 수 있습니다.

개발 속도에서도 차이가 납니다.
전통적 코딩은 사람이 직접 타이핑하고 설계합니다.
바이브코딩은 AI가 초안을 빠르게 생성합니다.

오류 수정 방식도 달라집니다.
전통 방식에서는 개발자가 로그를 보고 원인을 찾아야 합니다.
바이브코딩에서는 오류 메시지를 AI에게 붙여넣고
"이 오류를 해결해줘"라고 말할 수 있습니다.
AI는 오류 원인을 추정하고 수정 코드를 제안합니다.

그렇다면 바이브코딩이 전통적 코딩을 완전히 대체할까요?
그렇지는 않습니다.

오히려 바이브코딩이 확산될수록
전통적 코딩 지식의 가치는 형태가 바뀝니다.

예전에는 코드를 직접 쓰기 위해 필요했다면,
앞으로는 AI가 만든 코드를 검토하고,
더 좋은 구조로 이끌기 위해 필요합니다.

비유하자면,
예전에는 직접 운전해야 목적지에 갈 수 있었습니다.
이제는 내비게이션과 자율주행이 생겼습니다.
그렇다고 운전 지식이 완전히 필요 없어지는 것은 아닙니다.
위험한 상황을 판단하고,
잘못된 길을 바로잡고,
목적지를 정확히 설정하는 능력은 여전히 중요합니다.

바이브코딩도 마찬가지입니다.
AI가 코드를 쓴다고 해서 사람이 아무것도 몰라도 되는 것은 아닙니다.
사람은 더 높은 수준에서 판단해야 합니다.

그래서 핵심 통찰은 이것입니다.

바이브코딩은 단순한 도구 변화가 아니라
소프트웨어 개발의 언어가
문법에서 논리로 이동하는 변화입니다.

슬라이드 8. 바이브코딩이 가져온 5가지 혁명 / 5분

바이브코딩이 가져온 다섯 가지 변화를 보겠습니다.

첫 번째는 개발 민주화입니다.
과거에는 개발자만 소프트웨어를 만들 수 있었습니다.
하지만 이제는 의사, 교사, 마케터, 디자이너, 기획자도
자신의 업무 문제를 해결하는 간단한 도구를 직접 만들 수 있습니다.

예를 들어 교사는 학생별 학습 기록을 정리하는 작은 웹앱을 만들 수 있습니다.
마케터는 캠페인 성과를 자동으로 정리하는 대시보드를 만들 수 있습니다.
디자이너는 포트폴리오 사이트의 인터랙션을 빠르게 실험할 수 있습니다.

두 번째는 생산성 폭발입니다.
단순 반복 코딩, 기본 화면 구성, 테스트 코드 작성,
문서 작성 같은 작업은 AI가 빠르게 도와줄 수 있습니다.
사람은 더 중요한 판단과 설계에 집중할 수 있습니다.

세 번째는 창의성 극대화입니다.
"어떻게 만들지"에 너무 많은 시간을 쓰면
정작 "무엇을 만들지"를 고민할 시간이 줄어듭니다.
바이브코딩은 기본 구현 시간을 줄여주기 때문에
사용자 경험, 아이디어, 기획에 더 많은 시간을 쓸 수 있습니다.

네 번째는 비용 혁신입니다.
외주를 맡기거나 개발 리소스를 투입하기 전에
내부에서 빠르게 초안을 만들어볼 수 있습니다.
물론 최종 제품은 전문가의 검토가 필요하지만,
초기 실험 비용은 크게 줄어듭니다.

다섯 번째는 하이퍼 애자일입니다.
하이퍼 애자일은 아주 빠른 실험과 개선을 의미합니다.
사용자 반응을 보고 바로 고치고,
다음 날 다시 보여주고,
또 수정하는 흐름이 가능해집니다.

예를 들어 사내 교육 신청 페이지를 만들었는데,
사용자들이 "신청 완료 문구가 잘 안 보인다"고 말한다면
즉시 AI에게 말할 수 있습니다.

"신청 완료 메시지를 더 크게 보여주고,
초록색 체크 아이콘을 추가해줘."

이런 수정이 과거보다 훨씬 빨라집니다.

결국 바이브코딩의 가치는
단순히 코드를 빨리 쓰는 것이 아닙니다.
아이디어를 빠르게 실험하고,
현장의 문제를 빠르게 해결하고,
사용자의 피드백을 빠르게 반영하는 데 있습니다.

슬라이드 9. 장밋빛 미래 뒤에 숨은 그림자 / 5분

바이브코딩의 리스크를 살펴보겠습니다.

새로운 기술을 이야기할 때 장점만 말하면 위험합니다.
바이브코딩도 분명히 강력하지만,
아무 생각 없이 사용하면 문제가 생길 수 있습니다.

첫 번째 리스크는 보안과 환각입니다.
AI는 그럴듯한 코드를 만들 수 있지만,
항상 안전한 코드를 만드는 것은 아닙니다.
로그인 기능을 만들었는데 보안이 허술할 수 있고,
개인정보를 다루는 방식이 잘못될 수 있고,
인증이나 권한 처리가 빠질 수도 있습니다.

또 AI는 때때로 존재하지 않는 기능이나 잘못된 설명을
매우 자신 있게 말하기도 합니다.
이것을 환각이라고 부릅니다.

그래서 AI가 만든 코드는 반드시 검토해야 합니다.
특히 개인정보, 결제, 인증, 권한, 데이터베이스가 포함된 기능은
전문가의 점검이 필요합니다.

두 번째 리스크는 기술 부채입니다.
AI에게 계속 즉흥적으로 수정만 요청하면
코드가 점점 복잡해질 수 있습니다.
처음에는 잘 작동하지만,
나중에는 어디를 고쳐야 할지 알기 어려운 구조가 될 수 있습니다.

이런 코드를 흔히 스파게티 코드라고 합니다.
면이 엉켜 있는 것처럼 코드가 복잡하게 얽혀 있는 상태입니다.

세 번째 리스크는 이해력 저하입니다.
AI가 만들어 준 코드를 전혀 이해하지 않고 그대로 복사해서 사용하면,
문제가 생겼을 때 해결할 수 없습니다.
처음에는 편하지만 장기적으로는 위험합니다.

그래서 바이브코딩을 할 때는
AI에게 코드만 만들어 달라고 하지 말고,
설명도 함께 요청하는 것이 좋습니다.

예를 들어 이렇게 말할 수 있습니다.

"이 코드를 초보자도 이해할 수 있게 설명해줘."
"어떤 파일이 어떤 역할을 하는지 정리해줘."
"나중에 수정하기 쉬운 구조로 리팩토링해줘."
"보안상 위험한 부분이 있는지 점검해줘."

바이브코딩에서 사람의 역할은 줄어드는 것이 아니라 바뀝니다.
직접 쓰는 역할은 줄어들 수 있지만,
판단하고 검토하고 책임지는 역할은 더 중요해집니다.

AI는 빠른 조수이지만,
최종 책임자는 사람입니다.

슬라이드 10. 성공적인 바이브코더의 5가지 황금 법칙 / 5분

바이브코딩을 잘하기 위한 다섯 가지 원칙을 보겠습니다.

첫 번째, AI 코드는 반드시 검토하라.
AI가 만든 코드가 작동한다고 해서 좋은 코드라는 뜻은 아닙니다.
보이지 않는 오류가 있을 수 있고,
나중에 유지보수가 어려운 구조일 수 있습니다.
따라서 최소한 어떤 기능이 어디에 있는지,
어떤 데이터가 어디로 이동하는지 정도는 이해해야 합니다.

두 번째, 보안 점검은 필수입니다.
배포하기 전에 AI에게 반드시 물어보는 습관을 들이면 좋습니다.

"이 코드에서 보안 취약점이 있는지 찾아줘."
"사용자 입력값 검증이 충분한지 확인해줘."
"개인정보가 노출될 위험이 있는지 점검해줘."

AI의 답변도 완벽하지는 않지만,
기본적인 위험을 발견하는 데 도움이 됩니다.

세 번째, 모듈화 설계를 유지하라.
처음부터 파일과 기능을 깔끔하게 나누어야 나중에 수정이 쉽습니다.
AI에게도 이렇게 요청할 수 있습니다.

"기능별로 파일을 나눠줘."
"재사용 가능한 컴포넌트로 정리해줘."
"나중에 유지보수하기 쉬운 구조로 만들어줘."

네 번째, 명확한 프롬프트가 핵심입니다.
AI에게 대충 말하면 대충 나옵니다.
구체적으로 말하면 결과가 좋아집니다.

나쁜 예는 이렇습니다.
"예쁜 사이트 만들어줘."

좋은 예는 이렇습니다.
"초등학생 대상 성경퀴즈 사이트를 만들어줘.
배경은 밝고 귀엽게,
버튼은 큼직하게,
문제는 한 화면에 하나씩 나오게,
10초 타이머와 정답 공개 화면을 넣어줘."

훨씬 구체적입니다.

다섯 번째, 주기적 리팩토링입니다.
AI는 빠르게 코드를 추가하지만,
그 과정에서 코드가 장황해질 수 있습니다.
따라서 어느 정도 기능을 만든 뒤에는
"전체 코드를 정리해줘"라고 요청해야 합니다.

예를 들어 이렇게 말할 수 있습니다.

"현재 기능은 유지하되, 중복 코드를 줄여줘."
"파일 구조를 더 깔끔하게 정리해줘."
"초보자도 이해하기 쉽게 주석을 추가해줘."
"불필요한 코드는 제거해줘."

바이브코딩을 잘하는 사람은
AI에게 일을 맡기되,
방향과 기준은 분명하게 제시합니다.

무능한 상사가 되지 말고,
명확한 리더가 되어야 합니다.

슬라이드 11. 바이브코딩이 바꾸는 미래 / 4분

바이브코딩이 바꿀 미래를 생각해 보겠습니다.

앞으로는 소프트웨어가 개발자만의 영역이 아니라
아이디어가 있는 모든 사람의 영역으로 넓어질 가능성이 큽니다.

의사는 환자 관리 도구를 직접 기획하고 초안을 만들 수 있습니다.
교사는 학생 맞춤형 학습 도구를 만들 수 있습니다.
마케터는 데이터 분석 자동화 도구를 만들 수 있습니다.
디자이너는 인터랙티브한 포트폴리오를 직접 만들 수 있습니다.
창업자는 개발자를 고용하기 전에 MVP를 먼저 만들 수 있습니다.

물론 모든 사람이 전문 개발자가 된다는 뜻은 아닙니다.
하지만 모든 사람이 소프트웨어를 활용해 문제를 해결할 수 있는 가능성은 커집니다.

이 변화는 문서 작성 도구의 변화와 비슷합니다.
과거에는 인쇄물을 만들려면 전문가가 필요했습니다.
하지만 워드프로세서와 프레젠테이션 도구가 보급되면서
누구나 문서와 발표자료를 만들 수 있게 되었습니다.

그렇다고 전문 디자이너나 편집자가 사라진 것은 아닙니다.
오히려 더 높은 수준의 전문성이 필요해졌습니다.

바이브코딩도 비슷합니다.
간단한 도구와 프로토타입은 누구나 만들 수 있게 되고,
전문 개발자는 더 복잡하고 중요한 문제를 해결하는 방향으로 역할이 진화할 것입니다.

중요한 것은 이 변화에 대해 두려워만 하지 않는 것입니다.
AI가 코드를 쓰는 시대에는
내가 가진 도메인 지식이 더 중요해질 수 있습니다.

예를 들어 교육 현장을 잘 아는 사람은
학생과 교사의 불편을 잘 압니다.
그 사람이 AI를 활용하면
현장에 맞는 도구를 빠르게 만들 수 있습니다.

즉, 앞으로의 경쟁력은
AI 사용 능력과 현장 이해력이 결합될 때 생깁니다.

슬라이드 12. 바이브코딩은 선택이 아닌 생존 전략 / 4분

바이브코딩은 이제 단순한 유행어가 아니라
일하는 방식의 변화로 볼 수 있습니다.

첫 번째, 이미 현실입니다.
많은 개발 도구와 서비스가 AI 기반으로 바뀌고 있습니다.
코드를 자동완성하는 수준을 넘어,
프로젝트를 이해하고 수정하는 AI 도구들이 빠르게 확산되고 있습니다.

두 번째, 역할이 바뀝니다.
개발자의 역할은 단순히 코드를 타이핑하는 사람에서
AI를 지휘하고,
문제를 정의하고,
구조를 설계하고,
품질을 검토하는 사람으로 바뀌고 있습니다.

비개발자에게도 변화가 있습니다.
예전에는 "나는 코딩을 몰라서 못 해"라고 말할 수 있었습니다.
하지만 앞으로는 "내가 원하는 것을 얼마나 명확히 설명할 수 있느냐"가 중요해집니다.

세 번째, 지금 시작해야 합니다.
처음부터 큰 프로젝트를 만들 필요는 없습니다.
아주 작은 것부터 시작하면 됩니다.

예를 들어 다음과 같은 과제가 좋습니다.

개인 할 일 목록 만들기.
간단한 설문 페이지 만들기.
성경퀴즈 문제 화면 만들기.
업무 체크리스트 자동화하기.
엑셀 데이터를 정리하는 간단한 스크립트 만들기.
회의록을 요약하는 자동화 도구 만들기.

처음에는 결과물이 어설플 수 있습니다.
하지만 AI와 대화하면서 고쳐보는 경험 자체가 중요합니다.

마지막으로 오늘의 핵심 문장을 다시 강조하고 싶습니다.

"AI가 코드를 쓰는 세상에서,
당신이 가진 아이디어와 도메인 지식이 가장 강력한 무기다."

앞으로 코딩은 개발자만의 언어가 아니라,
문제를 해결하고 싶은 모든 사람의 도구가 될 것입니다.

마무리 / 5분

오늘 발표를 정리하겠습니다.

첫째, 바이브코딩은 자연어로 의도를 설명하고 AI가 코드를 생성하는 새로운 개발 방식입니다.

둘째, 바이브코딩의 핵심은 문법 암기가 아니라 문제 정의와 명확한 지시입니다.

셋째, 바이브코딩은 프로토타입, MVP, 자동화, 교육용 샘플 제작에 특히 강합니다.

넷째, 하지만 보안, 유지보수, 코드 이해 부족 같은 리스크도 존재합니다.

다섯째, AI는 개발자를 대체하는 존재라기보다,
사람의 아이디어를 더 빠르게 현실로 만들도록 돕는 협업 도구입니다.

오늘 발표를 듣고 바로 해볼 수 있는 작은 실천을 하나 제안드리겠습니다.

집이나 회사에서 반복해서 하는 일이 하나 있을 겁니다.
파일 이름 바꾸기,
엑셀 정리하기,
자료 요약하기,
간단한 안내 페이지 만들기,
퀴즈 페이지 만들기 같은 일입니다.

그중 하나를 골라 AI에게 이렇게 말해보세요.

"이 일을 자동화하고 싶은데, 어떤 방식으로 만들 수 있을까?"
"초보자도 할 수 있게 단계별로 알려줘."
"실행 가능한 코드나 웹페이지로 만들어줘."

이 질문 하나가 바이브코딩의 시작입니다.

바이브코딩은 완벽한 기술이 아닙니다.
하지만 분명히 새로운 가능성을 열어주고 있습니다.

우리가 해야 할 일은 AI에게 모든 것을 맡기는 것이 아니라,
AI를 잘 지휘하는 사람이 되는 것입니다.

이상으로 발표를 마치겠습니다.
감사합니다.`;

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let blocks = [];
let curIdx  = 0;
let isListening  = false;
let recognition  = null;
let finalBuf     = '';
let silenceTimer = null;
let fontScale    = 1.0;
const BUF_MAX    = 150;

// Visualizer state
let audioCtx   = null;
let analyser   = null;
let micSrc     = null;
let micStream  = null;
let eqAnimId   = null;

// ══════════════════════════════════════════════
//  PARSE
// ══════════════════════════════════════════════
function parseScript(raw) {
  const lines  = raw.split('\n');
  const result = [];
  let   buf    = [];

  const flush = () => {
    if (!buf.length) return;
    const text = buf.join('\n').trim();
    if (!text) { buf = []; return; }
    const isHdr = buf.length === 1 &&
      (/^슬라이드\s*\d+/.test(text) || /^마무리/.test(text));
    result.push({
      type: isHdr ? 'header' : 'text',
      content: text,
      norm: text.replace(/[^가-힣a-zA-Z0-9]/g, '')
    });
    buf = [];
  };

  for (const line of lines) {
    const t = line.trim();
    if (t === '' || t.startsWith('===')) { flush(); }
    else buf.push(t);
  }
  flush();
  return result;
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render() {
  const c = document.getElementById('scroll');
  c.innerHTML = '';
  blocks.forEach((b, i) => {
    const d = document.createElement('div');
    d.className = `block ${b.type === 'header' ? 'hdr' : ''}`;
    d.id = `b${i}`;
    d.innerHTML = `<div class="inner">${esc(b.content).replace(/\n/g,'<br>')}</div>`;
    d.addEventListener('click', () => { setIdx(i); finalBuf = ''; });
    c.appendChild(d);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════
//  SET CURRENT BLOCK
// ══════════════════════════════════════════════
function setIdx(idx) {
  idx = Math.max(0, Math.min(blocks.length - 1, idx));
  curIdx = idx;

  document.querySelectorAll('.block').forEach((el, i) => {
    el.classList.remove('past','current','n1','n2','far');
    const d = i - curIdx;
    if      (d <  0) el.classList.add('past');
    else if (d === 0) el.classList.add('current');
    else if (d === 1) el.classList.add('n1');
    else if (d === 2) el.classList.add('n2');
    else              el.classList.add('far');
  });

  const total = blocks.length;
  const pct = Math.round(((idx + 1) / total) * 100);
  document.getElementById('prog-text').textContent = `${pct}/100%`;
  document.getElementById('prog-fill').style.width  = `${pct}%`;

  scrollTo(idx);
}

function scrollTo(idx) {
  const el  = document.getElementById(`b${idx}`);
  const box = document.getElementById('scroll');
  if (!el || !box) return;
  const bRect = box.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  const relTop = eRect.top - bRect.top + box.scrollTop;
  const target = relTop - box.clientHeight * 0.30;
  box.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
}

function move(dir) {
  setIdx(curIdx + dir);
  finalBuf = '';
}

// ══════════════════════════════════════════════
//  AUDIO VISUALIZER (이퀄라이저)
// ══════════════════════════════════════════════
async function startVisualizer() {
  const canvas = document.getElementById('eq-canvas');
  if (!canvas) return;
  canvas.width  = canvas.offsetWidth || 240;
  canvas.height = 70;

  try {
    // 스트림 한 번만 요청 — 재허용 팝업 방지
    if (!micStream) {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { noiseSuppression: true, echoCancellation: true, autoGainControl: false },
        video: false
      });
    }
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      micSrc   = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.82;
      micSrc.connect(analyser);
    } else if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    // 기존 애니메이션 취소 후 재시작
    if (eqAnimId) { cancelAnimationFrame(eqAnimId); eqAnimId = null; }
    drawEQ();
  } catch(e) {
    console.warn('Visualizer:', e);
  }
}

function drawEQ() {
  const canvas = document.getElementById('eq-canvas');
  if (!canvas || !analyser) return;

  const ctx = canvas.getContext('2d');
  const W   = canvas.width;
  const H   = canvas.height;
  const freqBuf = new Uint8Array(analyser.frequencyBinCount);
  const N   = 50;
  const GAP = 2.5;
  const bw  = (W - GAP * (N + 1)) / N;

  function frame() {
    eqAnimId = requestAnimationFrame(frame);
    analyser.getByteFrequencyData(freqBuf);

    ctx.clearRect(0, 0, W, H);

    // Build bar points
    const pts = [];
    for (let i = 0; i < N; i++) {
      const di = Math.floor(i * (freqBuf.length * 0.65) / N);
      const v  = freqBuf[di] / 255;
      const bh = 5 + v * (H - 14);
      const x  = GAP + i * (bw + GAP);
      pts.push({ x0: x, cx: x + bw / 2, y: H - bh, bh, v });
    }

    // ① Gradient fill below the smooth curve
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(pts[0].cx, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i-1], c = pts[i];
      const mx = (p.cx + c.cx) / 2;
      ctx.bezierCurveTo(mx, p.y, mx, c.y, c.cx, c.y);
    }
    ctx.lineTo(pts[pts.length-1].cx, H);
    ctx.closePath();
    const fillG = ctx.createLinearGradient(0, 0, 0, H);
    fillG.addColorStop(0, 'rgba(109,40,217,0.18)');
    fillG.addColorStop(1, 'rgba(37,99,235,0.06)');
    ctx.fillStyle = fillG;
    ctx.fill();

    // ② Bars
    pts.forEach(({ x0, y, bh, v }) => {
      const g = ctx.createLinearGradient(0, H, 0, y);
      g.addColorStop(0,   `rgba(29,78,216,${0.55 + v * 0.45})`);
      g.addColorStop(0.5, `rgba(109,40,217,${0.6 + v * 0.4})`);
      g.addColorStop(1,   `rgba(167,139,250,${0.45 + v * 0.55})`);
      ctx.fillStyle = g;
      ctx.fillRect(x0, y, bw, bh);
    });

    // ③ Smooth top curve
    ctx.beginPath();
    ctx.moveTo(pts[0].cx, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i-1], c = pts[i];
      const mx = (p.cx + c.cx) / 2;
      ctx.bezierCurveTo(mx, p.y, mx, c.y, c.cx, c.y);
    }
    const lineG = ctx.createLinearGradient(0, 0, W, 0);
    lineG.addColorStop(0,   '#3b82f6');
    lineG.addColorStop(0.5, '#8b5cf6');
    lineG.addColorStop(1,   '#a78bfa');
    ctx.strokeStyle = lineG;
    ctx.lineWidth   = 2.5;
    ctx.shadowColor = 'rgba(139,92,246,0.75)';
    ctx.shadowBlur  = 10;
    ctx.stroke();
    ctx.shadowBlur  = 0;
  }
  frame();
}

function stopVisualizer() {
  // 애니메이션만 중단 — micStream·audioCtx·analyser 유지 (재허용 팝업 방지)
  if (eqAnimId) { cancelAnimationFrame(eqAnimId); eqAnimId = null; }
}

// Toast: 위치 확인 알림
function showMatchToast(idx) {
  const old = document.getElementById('match-toast');
  if (old) old.remove();

  const preview = blocks[idx] ? blocks[idx].content.slice(0, 40) : '';
  const toast = document.createElement('div');
  toast.id = 'match-toast';
  toast.style.cssText = `
    position:fixed; bottom:74px; left:50%; transform:translateX(-50%);
    background:#0d0e1a; border:1.5px solid #22c55e; color:#e8e9f3;
    padding:13px 24px; border-radius:16px; font-size:.88rem; font-weight:700;
    z-index:400; text-align:center; white-space:nowrap;
    box-shadow:0 4px 28px rgba(34,197,94,.3);
    animation:slideUpToast .3s ease;
  `;
  toast.innerHTML =
    `<span style="color:#22c55e">✅</span> ` +
    `<strong>${idx + 1}번째 블록</strong> 위치 확인됨` +
    `<div style="color:#44475a;font-size:.78rem;font-weight:400;margin-top:3px;">"${preview}…"</div>`;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity .4s';
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 400);
  }, 3200);
}

// ══════════════════════════════════════════════
//  SPEECH RECOGNITION
// ══════════════════════════════════════════════
function toggleMic() {
  isListening ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('status').textContent = '❌ Chrome 브라우저가 필요합니다';
    return;
  }

  if (!recognition) {
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = (e) => {
      let interim = '', final_ = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const res = e.results[i];
        const t   = res[0].transcript;
        if (res.isFinal) {
          // 신뢰도 0.35 미만은 노이즈/음악으로 간주 무시 (0은 미제공이므로 허용)
          const conf = res[0].confidence;
          if (conf > 0 && conf < 0.35) continue;
          final_ += t;
        } else {
          interim += t;
        }
      }

      // 침묵 타이머 초기화 — 말할 때마다 리셋
      clearTimeout(silenceTimer);

      const heard = final_ || interim;
      if (heard) {
        document.getElementById('recognized').textContent = heard;
        // 2.5초 후 침묵이면 텍스트 삭제
        silenceTimer = setTimeout(() => {
          document.getElementById('recognized').textContent = '';
        }, 2500);
      }

      if (final_) {
        finalBuf = (finalBuf + ' ' + final_).slice(-BUF_MAX);
        tryAdvance();
      } else if (interim) {
        tryAdvanceQuick(interim);
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') {
        document.getElementById('status').textContent = '❌ 마이크 권한을 허용해주세요';
        stopMic();
      }
    };

    recognition.onend = () => {
      if (isListening) {
        setTimeout(() => { try { recognition.start(); } catch(_) {} }, 150);
      }
    };
  }

  isListening = true;
  try { recognition.start(); } catch(_) {}
  document.getElementById('status').innerHTML = '<span class="rec-pulse"></span>음성 인식 중 · 말씀하세요';
  document.getElementById('status').classList.add('on');

  // 모달 열기 + 이퀄라이저 시작
  document.getElementById('rec-modal').classList.add('show');
  // 모달 렌더 후 캔버스 크기 확정
  setTimeout(() => startVisualizer(), 60);
}

function stopMic() {
  isListening = false;
  clearTimeout(silenceTimer);
  if (recognition) { try { recognition.stop(); } catch(_) {} }
  document.getElementById('status').innerHTML = '준비됨';
  document.getElementById('status').classList.remove('on');
  document.getElementById('recognized').textContent = '';

  // 모달 닫기 + 시각화 중단
  document.getElementById('rec-modal').classList.remove('show');
  stopVisualizer();

  // 위치 확인 알림 + 현재 블록 flash 효과
  showMatchToast(curIdx);
  const curEl = document.getElementById(`b${curIdx}`);
  if (curEl) {
    curEl.classList.add('found');
    setTimeout(() => curEl.classList.remove('found'), 900);
  }
  // 스크롤 재정렬 (모달이 닫힌 후)
  setTimeout(() => scrollTo(curIdx), 100);
}

// ══════════════════════════════════════════════
//  BIGRAM SIMILARITY
// ══════════════════════════════════════════════
function bigrams(s) {
  const n = s.replace(/[^가-힣a-zA-Z0-9]/g, '');
  const set = new Set();
  for (let i = 0; i < n.length - 1; i++) set.add(n.slice(i, i + 2));
  return set;
}

function sim(src, tgt) {
  const sb = bigrams(src), tb = bigrams(tgt);
  if (!tb.size || !sb.size) return 0;
  let m = 0;
  for (const bg of tb) if (sb.has(bg)) m++;
  // 말한 내용(sb) 기준: 내가 말한 글자가 대본에 얼마나 포함되는지
  return m / Math.min(sb.size, tb.size);
}

// 인터림(말하는 중) — 근방 즉시 탐색
function tryAdvanceQuick(text) {
  if (text.replace(/[^가-힣]/g, '').length < 4) return;

  const THRES = 0.25;
  let best = THRES, bestI = -1;
  const from = Math.max(0, curIdx - 2);
  const to   = Math.min(blocks.length, curIdx + 10);

  for (let i = from; i < to; i++) {
    if (blocks[i].type !== 'text') continue;
    const s = sim(text, blocks[i].content);
    if (s > best) { best = s; bestI = i; }
  }

  if (bestI >= 0 && bestI !== curIdx) setIdx(bestI);
}

// 파이널 결과 — 넓은 윈도우로 정밀 탐색
function tryAdvance() {
  if (finalBuf.replace(/[^가-힣]/g, '').length < 4) return;

  const WIN_BACK = 3;
  const WIN_FWD  = 15;
  const THRES    = 0.22;

  let best = THRES, bestI = -1;
  const from = Math.max(0, curIdx - WIN_BACK);
  const to   = Math.min(blocks.length, curIdx + WIN_FWD + 1);

  for (let i = from; i < to; i++) {
    if (blocks[i].type !== 'text') continue;
    const s = sim(finalBuf, blocks[i].content);
    if (s > best) { best = s; bestI = i; }
  }

  if (bestI >= 0 && bestI !== curIdx) {
    setIdx(bestI);
    finalBuf = finalBuf.slice(-70);
  }
}

// ══════════════════════════════════════════════
//  FONT SIZE CONTROL
// ══════════════════════════════════════════════
document.getElementById('font-range').addEventListener('input', function() {
  document.documentElement.style.setProperty('--fs', (this.value / 100) + 'rem');
});

// ══════════════════════════════════════════════
//  INDEX SCREEN
// ══════════════════════════════════════════════
function initIndexScreen() {
  const drop = document.getElementById('idx-drop');
  const fileInput = document.getElementById('idx-file');
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  if (isTouch) {
    document.querySelector('.idx-drop-text').innerHTML =
      'TXT 파일을<br><strong>탭하여 선택</strong>하세요';
    document.querySelector('.idx-drop-icon').textContent = '📂';
  }

  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  if (!isTouch) {
    drop.addEventListener('dragover', (e) => {
      e.preventDefault();
      drop.classList.add('drag');
    });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault();
      drop.classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f);
    });
  }

  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    document.querySelector('.idx-sub').textContent =
      '⚠️ 이 브라우저는 음성인식을 지원하지 않습니다. Chrome을 사용해주세요.';
  }
}

function showDirectInput() {
  document.getElementById('idx-file-area').style.display = 'none';
  document.getElementById('direct-section').style.display = 'block';
  document.getElementById('direct-textarea').focus();
}

function hideDirectInput() {
  document.getElementById('direct-section').style.display = 'none';
  document.getElementById('idx-file-area').style.display = 'block';
}

function submitDirectInput() {
  const text = document.getElementById('direct-textarea').value.trim();
  if (!text) return;
  startTeleprompter(text);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => startTeleprompter(e.target.result);
  reader.readAsText(file, 'UTF-8');
}

// ── FULLSCREEN ──
function enterFullscreen() {
  const el = document.documentElement;
  const go = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (go) go.call(el).catch(() => {});
}

function fsExit() {
  const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if (exit && (document.fullscreenElement || document.webkitFullscreenElement)) {
    exit.call(document).catch(() => {});
  }
  // iOS: fullscreen API 없어도 버튼은 즉시 숨김
  document.getElementById('fs-exit-btn').classList.remove('visible');
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    document.getElementById('fs-exit-btn').classList.remove('visible');
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    document.getElementById('fs-exit-btn').classList.remove('visible');
  }
});

function startTeleprompter(text) {
  document.getElementById('index-screen').style.display = 'none';
  blocks = parseScript(text);
  render();
  setIdx(0);
  document.documentElement.style.setProperty('--fs', '0.9rem');
  document.getElementById('font-range').value = '90';
  // 터치 기기: 전체화면 진입 + 나가기 버튼 표시
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) {
    enterFullscreen();
    document.getElementById('fs-exit-btn').classList.add('visible');
  }
  setTimeout(() => startMic(), 400);
}

function goHome() {
  stopMic();
  fsExit();
  document.getElementById('fs-exit-btn').classList.remove('visible');
  blocks = [];
  finalBuf = '';
  document.getElementById('scroll').innerHTML = '';
  document.getElementById('prog-text').textContent = '0/100%';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('status').innerHTML = '준비됨';
  document.getElementById('status').classList.remove('on');
  document.getElementById('recognized').textContent = '';
  document.getElementById('idx-file').value = '';
  document.getElementById('direct-textarea').value = '';
  hideDirectInput();
  document.getElementById('index-screen').style.display = 'flex';
}

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { e.preventDefault(); move(1);  }
  else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
  else if (e.key === ' ')  { e.preventDefault(); toggleMic(); }
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.getElementById('scroll').addEventListener('scroll', function() {
  const sh = this.scrollHeight - this.clientHeight;
  if (sh <= 0) return;
  const pct = Math.round((this.scrollTop / sh) * 100);
  document.getElementById('prog-text').textContent = `${pct}/100%`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
});

initIndexScreen();
</script>
